services:
  # LINE Webhook サーバー（常時起動）
  - type: web
    name: youtube-factory-line
    env: python
    plan: starter
    buildCommand: |
      pip install -r requirements.txt &&
      apt-get install -y ffmpeg 2>/dev/null || true
    startCommand: python startup.py && gunicorn notify_line:app --bind 0.0.0.0:$PORT --timeout 300 --workers 1
    disk:
      name: youtube-factory-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data
      - key: PYTHONUNBUFFERED
        value: "1"
      # 以下はRenderダッシュボードで手動設定
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: HEYGEN_API_KEY
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_NOTIFY_USER_ID
        sync: false
      - key: PEXELS_API_KEY
        sync: false
      - key: SAKURA_SKIP_UPLOAD
        value: "false"
      # YouTubeトークン（base64でエンコードして貼る）
      - key: YOUTUBE_TOKEN_B64
        sync: false
      - key: SAKURA_YOUTUBE_TOKEN_B64
        sync: false
      - key: YOUTUBE_CLIENT_SECRETS_B64
        sync: false
      - key: VOICEVOX_URL
        fromService:
          name: voicevox-engine
          type: web
          property: host

  # サクラ 毎日6時スケジューラー（前日20:00 JST = 11:00 UTC に実行）
  - type: cron
    name: sakura-daily-6am
    env: python
    plan: starter
    schedule: "0 11 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python startup.py && python sakura/scheduler.py --now
    envVars:
      - key: DATA_DIR
        value: /data
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_NOTIFY_USER_ID
        sync: false

  # 週次チャンネル分析（月曜9:00 UTC = 月曜18:00 JST）
  - type: cron
    name: weekly-analysis
    env: python
    plan: starter
    schedule: "0 9 * * 1"
    buildCommand: pip install -r requirements.txt
    startCommand: python startup.py && python weekly_analysis.py
    envVars:
      - key: DATA_DIR
        value: /data
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SAKURA_YOUTUBE_TOKEN_JSON
        sync: false
      - key: YOUTUBE_TOKEN_JSON
        sync: false

  # VOICEVOX エンジン（Sakura日本語TTS用）
  - type: web
    name: voicevox-engine
    env: docker
    plan: starter
    dockerfilePath: Dockerfile.voicevox
    envVars:
      - key: PORT
        value: "50021"

  # AI Japan Labo → Hana転換のため停止中
