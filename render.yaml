services:
  # LINE Webhook サーバー（常時起動）
  - type: web
    name: ryo-factory
    env: python
    plan: starter
    buildCommand: |
      pip install -r requirements.txt &&
      apt-get install -y ffmpeg 2>/dev/null || true
    startCommand: python startup.py && gunicorn notify_line:app --bind 0.0.0.0:$PORT --timeout 300 --workers 1
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SAKURA_SKIP_UPLOAD
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.0"

  # サクラ 毎日20:00 JST（= 11:00 UTC）に台本生成
  - type: cron
    name: sakura-daily-8pm
    env: python
    plan: starter
    schedule: "0 11 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python startup.py && python sakura/scheduler.py --now
    envVarGroups:
      - ryo-factory
    envVars:
      - key: DATA_DIR
        value: /data
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SERVICE_URL
        value: https://ryo-factory.onrender.com
      - key: PYTHON_VERSION
        value: "3.12.0"

  # 週次チャンネル分析（月曜9:00 UTC = 月曜18:00 JST）
  - type: cron
    name: weekly-analysis
    env: python
    plan: starter
    schedule: "0 9 * * 1"
    buildCommand: pip install -r requirements.txt
    startCommand: python startup.py && python weekly_analysis.py
    envVarGroups:
      - ryo-factory
    envVars:
      - key: DATA_DIR
        value: /data
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHON_VERSION
        value: "3.12.0"

  # AI Japan Labo → Hana転換のため停止中
